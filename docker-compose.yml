services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://voicedoc:${DB_PASSWORD}@db:5432/voicedoc
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      COMMAND_TRIGGER_DEFAULT: ${COMMAND_TRIGGER_DEFAULT:-Computer}
      AI_TRIGGER_DEFAULT: ${AI_TRIGGER_DEFAULT:-Assistant}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicedoc
      POSTGRES_USER: voicedoc
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voicedoc']
      interval: 10s
      retries: 5

volumes:
  pgdata:
